<!doctype html>
<html lang="sk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>DERAT.sk – AI asistent & cenová kalkulačka</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<!-- Voliteľné: EmailJS na odosielanie dopytov (ak vyplníte ID v CONFIG nižšie) -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
/* ===========================================================
   DERAT.sk widget · farby derat.sk (zelená #406618 / červená #c63a27)
   layout & UX inšpirované konfigurátorom „Môj plot"
   =========================================================== */
:root{
  --g:#406618;--g-dk:#2e4a11;--g-700:#37591a;--g-lt:#5a8a24;--g-50:#eef3e6;--g-100:#e2ecd5;
  --red:#c63a27;--red-dk:#9e2a1a;
  --ink:#1e231d;--muted:#6b7363;--line:#e3e8db;--paper:#fff;--bg:#f5f8f0;--wa:#25d366;
  --sh:0 18px 50px rgba(31,40,18,.18);--r:18px;
  --font:'Poppins',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
}
*{box-sizing:border-box}
body{margin:0;font-family:var(--font);color:var(--ink);background:#fff}
img{max-width:100%}

/* Demo pozadie (na ostrej stránke zmazať blok .demo) */
.demo{min-height:100vh;background:radial-gradient(circle at 80% 0,#e7f0d6,transparent 45%),linear-gradient(180deg,#fbfdf7,#e9f1dc);padding:54px 20px 140px;text-align:center}
.demo h1{font-size:clamp(28px,5vw,50px);font-weight:900;margin:0 0 12px;color:var(--g-dk);letter-spacing:-.5px}
.demo h1 span{color:var(--red)}
.demo p{max-width:580px;margin:0 auto 8px;color:#5a6353;font-weight:500;line-height:1.6;font-size:16px}
.demo .hint{margin-top:26px;display:inline-flex;align-items:center;gap:9px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:11px 18px;font-weight:700;font-size:14px;color:var(--g);box-shadow:0 8px 24px rgba(46,74,17,.10)}

/* ===== Animácie ===== */
@keyframes drPulse{0%,100%{box-shadow:0 16px 34px rgba(64,102,24,.42),0 0 0 0 rgba(64,102,24,.34)}50%{box-shadow:0 16px 34px rgba(64,102,24,.42),0 0 0 14px rgba(64,102,24,0)}}
@keyframes drIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes drStep{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes drKen{0%{transform:scale(1.05)}100%{transform:scale(1.15)}}
@keyframes drDot{0%,80%,100%{transform:scale(.5);opacity:.4}40%{transform:scale(1);opacity:1}}
@keyframes drPop{0%{transform:scale(.5);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes drReveal{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.dr-mouse{display:block;object-fit:contain;user-select:none}

/* ===== Teaser + bublina ===== */
#derat-bubble{position:fixed;right:20px;bottom:20px;z-index:100000;width:66px;height:66px;border:0;border-radius:50%;background:radial-gradient(circle at 32% 24%,#6fa530,#406618 60%,#2e4a11);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .25s;animation:drPulse 2.6s ease-in-out infinite}
#derat-bubble:hover{transform:translateY(-2px) scale(1.06);animation-play-state:paused}
#derat-bubble.open{opacity:0;pointer-events:none;transform:scale(.85)}
#derat-bubble .dr-mouse{width:48px;height:48px}
.dr-dot{position:absolute;right:5px;top:5px;width:15px;height:15px;border-radius:50%;background:var(--red);border:3px solid #fff}

/* ===== Okno ===== */
#derat-chat{position:fixed;right:20px;bottom:96px;z-index:99999;width:382px;height:min(84vh,672px);max-height:672px;border-radius:24px;background:#fff;border:1px solid var(--line);box-shadow:var(--sh);display:flex;flex-direction:column;overflow:hidden;opacity:0;pointer-events:none;transform:translateY(20px) scale(.96);transform-origin:bottom right;transition:.3s cubic-bezier(.2,.8,.2,1)}
#derat-chat.show{opacity:1;pointer-events:auto;transform:none}

/* hlavička – zarovnaná */
.dr-head{padding:13px 14px;background:linear-gradient(135deg,#2e4a11,#406618 58%,#5a8a24);color:#fff;display:flex;align-items:center;gap:11px}
.dr-head-logo{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#6fa530,#2e4a11);display:flex;align-items:center;justify-content:center;flex:0 0 auto;box-shadow:0 5px 14px rgba(0,0,0,.22),inset 0 0 0 2px rgba(255,255,255,.25)}
.dr-head-logo .dr-mouse{width:34px;height:34px}
.dr-head-t{min-width:0;flex:1;display:flex;flex-direction:column;justify-content:center;gap:3px}
.dr-head-t b{font-size:15px;font-weight:800;line-height:1.1}
.dr-head-t span{font-size:11px;font-weight:600;color:rgba(255,255,255,.86);display:flex;gap:6px;align-items:center;line-height:1}
.dr-live{width:7px;height:7px;border-radius:50%;background:#a6f06f;box-shadow:0 0 0 0 rgba(166,240,111,.6);animation:drPulse 2.2s infinite;flex:0 0 auto}
.dr-head-act{display:flex;gap:7px}
.dr-hbtn{width:36px;height:36px;border:0;background:rgba(255,255,255,.92);color:var(--g-dk);border-radius:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s}
.dr-hbtn:hover{background:#fff}
.dr-hbtn.ghost{background:rgba(255,255,255,.16);color:#fff}
.dr-hbtn.ghost:hover{background:rgba(255,255,255,.28)}
.dr-hbtn svg{width:19px;height:19px;fill:currentColor}

/* CTA */
.dr-top{padding:12px 13px 9px;background:#fff;border-bottom:1px solid var(--line)}
.dr-cta{width:100%;border:1px solid rgba(64,102,24,.26);border-radius:15px;background:linear-gradient(135deg,#f3f8ea,#e6efd4);box-shadow:0 8px 20px rgba(64,102,24,.10);padding:12px;display:grid;grid-template-columns:46px 1fr auto;gap:12px;align-items:center;text-align:left;cursor:pointer;transition:.18s}
.dr-cta:hover{transform:translateY(-1px);box-shadow:0 14px 28px rgba(64,102,24,.18)}
.dr-cta-ic{width:46px;height:46px;border-radius:13px;background:linear-gradient(135deg,#5a8a24,#2e4a11);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 14px rgba(46,74,17,.28)}
.dr-cta-ic svg{width:25px;height:25px;fill:#fff}
.dr-cta b{font-size:13.5px;font-weight:800;color:var(--g-dk);display:block}
.dr-cta span{font-size:11px;font-weight:500;color:var(--muted);line-height:1.3}
.dr-cta .ar{font-size:25px;color:var(--g);font-weight:900;transition:.2s}
.dr-cta:hover .ar{transform:translateX(4px)}

/* správy */
.dr-msgs{flex:1;overflow:auto;padding:14px 13px 0;display:flex;flex-direction:column;gap:9px;background:linear-gradient(180deg,#fff,#f5f8f0)}
.dr-row{display:flex;gap:8px;align-items:flex-end;animation:drIn .3s ease}
.dr-row.me{justify-content:flex-end}
.dr-av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#6fa530,#2e4a11);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.dr-av .dr-mouse{width:24px;height:24px}
.dr-row.me .dr-av{display:none}
.dr-b{max-width:80%;padding:10px 13px;border-radius:16px;font:500 13px/1.5 var(--font);box-shadow:0 6px 16px rgba(31,40,18,.06)}
.dr-b.bot{background:#fff;border:1px solid var(--line);border-bottom-left-radius:6px}
.dr-b.bot b{color:var(--g)}
.dr-b.me{background:linear-gradient(135deg,#5a8a24,#2e4a11);color:#fff;border-bottom-right-radius:6px}
.dr-typing{display:flex;gap:4px;padding:14px}
.dr-typing span{width:7px;height:7px;border-radius:50%;background:var(--g-lt);animation:drDot 1.2s infinite}
.dr-typing span:nth-child(2){animation-delay:.18s}.dr-typing span:nth-child(3){animation-delay:.36s}

.dr-chips{display:flex;gap:6px;flex-wrap:wrap;padding:0 13px 10px;background:#f5f8f0}
.dr-chip{border:1px solid rgba(64,102,24,.24);background:#fff;border-radius:999px;color:var(--g-dk);padding:8px 12px;font:700 11.5px var(--font);cursor:pointer;transition:.15s}
.dr-chip:hover{background:var(--g-50);transform:translateY(-1px)}
.dr-inbar{display:flex;gap:8px;align-items:center;margin:0 13px 11px;padding:7px;border:1px solid var(--line);border-radius:15px;background:#fff;box-shadow:0 8px 18px rgba(31,40,18,.06)}
.dr-inbar input{flex:1;height:40px;border:1.4px solid var(--line);border-radius:12px;background:#f8fbf3;padding:0 12px;font:600 13px var(--font);outline:none;transition:.15s}
.dr-inbar input:focus{border-color:var(--g-lt);background:#fff}
.dr-inbar button{width:40px;height:40px;border:0;border-radius:12px;background:linear-gradient(135deg,#5a8a24,#2e4a11);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s}
.dr-inbar button:hover{transform:scale(1.06)}
.dr-inbar button svg{width:18px;fill:#fff}

/* kontaktná lišta – jednotná */
.dr-cbar{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;padding:10px 13px 13px;background:linear-gradient(180deg,#fff,#eef3e6);border-top:1px solid var(--line);order:9}
.dr-c{position:relative;height:58px;text-decoration:none;border:1.5px solid var(--g-100);border-radius:14px;background:#fff;box-shadow:0 4px 12px rgba(46,74,17,.07);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;overflow:hidden;transition:.2s cubic-bezier(.2,.8,.2,1)}
.dr-c:hover{transform:translateY(-2px);box-shadow:0 10px 20px rgba(46,74,17,.15);border-color:var(--g-lt)}
.dr-c:active{transform:translateY(0) scale(.97)}
.dr-c-ic{width:27px;height:27px;border-radius:8px;background:var(--g-50);display:flex;align-items:center;justify-content:center;transition:.2s}
.dr-c:hover .dr-c-ic{background:var(--g);transform:scale(1.06)}
.dr-c-ic svg{width:15px;height:15px;fill:var(--g);display:block;transition:fill .2s}
.dr-c:hover .dr-c-ic svg{fill:#fff}
.dr-c-lbl{color:var(--g-dk);font:800 11px var(--font);letter-spacing:.2px}
.dr-c.tap{animation:drTap .4s ease}
@keyframes drTap{0%{transform:scale(1)}40%{transform:scale(.93)}100%{transform:scale(1)}}

/* ===== KALKULAČKA ===== */
.dr-calc{display:none;flex:1;min-height:0;overflow:hidden;background:linear-gradient(180deg,#fff,#f5f8f0);order:2;flex-direction:column}
#derat-chat.calc .dr-msgs,#derat-chat.calc .dr-chips,#derat-chat.calc .dr-inbar,#derat-chat.calc .dr-top{display:none}
#derat-chat.calc .dr-calc{display:flex;animation:drReveal .34s cubic-bezier(.2,.8,.2,1)}
#derat-chat.calc .dr-cbar{display:grid}

.dr-chead{display:flex;align-items:center;gap:10px;padding:13px 13px 9px}
.dr-chead b{font-size:15px;font-weight:900;color:var(--g-dk);flex:1}
.dr-x{width:32px;height:32px;border-radius:11px;border:1px solid var(--line);background:#fff;color:#7c857a;font-size:20px;cursor:pointer}
.dr-x:hover{background:#f3f5ef}
.dr-prog{display:flex;align-items:center;gap:9px;padding:0 13px 11px}
.dr-back{width:30px;height:30px;border-radius:50%;border:1px solid var(--line);background:#fff;color:var(--g-dk);font-weight:900;cursor:pointer;flex:0 0 auto}
.dr-back:disabled{opacity:.32}
.dr-prog-track{flex:1;height:7px;background:#e0e9d3;border-radius:999px;overflow:hidden}
.dr-prog-fill{height:100%;background:linear-gradient(90deg,#406618,#5a8a24,#a6f06f);transition:width .4s cubic-bezier(.2,.8,.2,1)}
.dr-prog-n{font:900 11px var(--font);color:var(--g);white-space:nowrap}

.dr-body{flex:1;overflow:auto;padding:0 13px 8px}

/* hero foto – čistá, ľahký overlay len dole pod popisom */
.dr-hero{position:relative;border-radius:var(--r);overflow:hidden;background:#dfe7d4;aspect-ratio:16/9;margin-bottom:13px;border:1px solid var(--line)}
.dr-hero-img{position:absolute;inset:0;background-size:cover;background-position:center;animation:drKen 18s ease-in-out infinite alternate}
.dr-hero-ov{position:absolute;inset:0;background:linear-gradient(180deg,transparent 52%,rgba(20,28,16,.62))}
.dr-hero-svg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 70% 25%,#fff,transparent 50%),linear-gradient(180deg,#e3ecd6,#fff)}
.dr-hero-svg svg{width:46%;height:46%}
.dr-hero-cap{position:absolute;left:12px;right:12px;bottom:11px;display:flex;align-items:center;gap:7px;color:#fff;font:800 12.5px var(--font);text-shadow:0 1px 5px rgba(0,0,0,.5)}
.dr-hero-cap .d{width:7px;height:7px;border-radius:50%;background:#a6f06f;flex:0 0 auto}
.dr-hero-cap .bdg{margin-left:auto;background:rgba(255,255,255,.94);color:var(--g-dk);font:800 10px var(--font);padding:4px 9px;border-radius:999px;text-shadow:none}

.dr-q{font-size:16.5px;font-weight:900;color:var(--g-dk);margin:0 0 3px;letter-spacing:-.2px}
.dr-q-sub{font-size:11.5px;font-weight:500;color:var(--muted);line-height:1.4;margin-bottom:12px}

/* info box */
.dr-info{display:flex;gap:9px;background:var(--g-50);border:1px solid rgba(64,102,24,.18);border-radius:13px;padding:10px 12px;margin-bottom:12px;animation:drStep .3s ease}
.dr-info .i{flex:0 0 22px;width:22px;height:22px;border-radius:50%;background:var(--g);color:#fff;display:flex;align-items:center;justify-content:center;font:900 13px var(--font)}
.dr-info p{margin:0;font:500 11.3px/1.5 var(--font);color:#3a4a2c}
.dr-info b{color:var(--g-dk)}

/* karty s fotkou (služba, priestor) */
.dr-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.dr-grid.tri{grid-template-columns:1fr 1fr 1fr}
/* zoznam služieb na celú šírku */
.dr-rows{display:flex;flex-direction:column;gap:9px}
.dr-rowcard{position:relative;display:grid;grid-template-columns:84px 1fr auto;align-items:center;gap:12px;border:1.8px solid var(--line);background:#fff;border-radius:15px;overflow:hidden;cursor:pointer;text-align:left;padding-right:14px;transition:.16s;animation:drStep .35s ease both}
.dr-rowcard:hover{border-color:var(--g-lt);transform:translateY(-2px);box-shadow:0 10px 20px rgba(46,74,17,.12)}
.dr-rowcard.sel{border-color:var(--g);box-shadow:0 0 0 3px rgba(64,102,24,.16)}
.dr-rowcard-img{width:84px;height:74px;background-size:cover;background-position:center;background-color:#dfe7d4}
.dr-rowcard-bd b{font-size:14px;font-weight:800;color:var(--ink);display:block;line-height:1.15}
.dr-rowcard-bd span{font-size:11px;font-weight:500;color:var(--muted);line-height:1.3;display:block;margin-top:2px}
.dr-rowcard-pr{text-align:right;font:900 13px var(--font);color:var(--g);white-space:nowrap}
.dr-rowcard-pr small{display:block;font:600 9px var(--font);color:var(--muted);letter-spacing:.3px}
.dr-rowcard.sel:after{content:"✓";position:absolute;left:8px;top:8px;width:21px;height:21px;border-radius:50%;background:var(--g);color:#fff;display:flex;align-items:center;justify-content:center;font:900 12px var(--font);animation:drPop .3s ease;box-shadow:0 2px 6px rgba(0,0,0,.35)}
.dr-pcard{position:relative;border:1.8px solid var(--line);background:#fff;border-radius:15px;overflow:hidden;cursor:pointer;text-align:left;transition:.16s;animation:drStep .35s ease both}
.dr-pcard:hover{border-color:var(--g-lt);transform:translateY(-2px);box-shadow:0 10px 20px rgba(46,74,17,.12)}
.dr-pcard.sel{border-color:var(--g);box-shadow:0 0 0 3px rgba(64,102,24,.16)}
.dr-pcard-img{height:80px;background-size:cover;background-position:center;background-color:#dfe7d4}
.dr-pcard-svg{height:80px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#eef3e6,#dde7d0)}
.dr-pcard-svg svg{width:42px;height:42px}
.dr-pcard-bd{padding:9px 10px}
.dr-pcard-bd b{font-size:12.5px;font-weight:800;color:var(--ink);display:block;line-height:1.15}
.dr-pcard-bd span{font-size:10px;font-weight:500;color:var(--muted);line-height:1.25;display:block;margin-top:2px}
.dr-pcard-bd .pr{font-size:10.5px;font-weight:900;color:var(--g);margin-top:5px;display:block}
.dr-pcard.sel:after{content:"✓";position:absolute;right:7px;top:7px;width:23px;height:23px;border-radius:50%;background:var(--g);color:#fff;display:flex;align-items:center;justify-content:center;font:900 13px var(--font);animation:drPop .3s ease;box-shadow:0 2px 6px rgba(0,0,0,.25)}

/* malé karty (škodca) – jednotná veľkosť ikon */
.dr-scard{position:relative;border:1.7px solid var(--line);background:#fff;border-radius:13px;cursor:pointer;padding:11px 8px;display:flex;flex-direction:column;align-items:center;gap:7px;text-align:center;transition:.15s;animation:drStep .3s ease both}
.dr-scard:hover{border-color:var(--g-lt);transform:translateY(-2px)}
.dr-scard.sel{border-color:var(--g);background:var(--g-50)}
.dr-scard-ic{width:40px;height:40px;display:flex;align-items:center;justify-content:center}
.dr-scard-ic svg{width:40px;height:40px;display:block}
.dr-scard b{font-size:11.5px;font-weight:800;color:var(--ink);line-height:1.15}
.dr-scard.sel:after{content:"✓";position:absolute;right:5px;top:5px;width:19px;height:19px;border-radius:50%;background:var(--g);color:#fff;display:flex;align-items:center;justify-content:center;font:900 11px var(--font)}

/* radio / checkbox */
.dr-list{display:flex;flex-direction:column;gap:8px}
.dr-opt{border:1.7px solid var(--line);background:#fff;border-radius:13px;cursor:pointer;display:flex;gap:10px;align-items:center;padding:11px;transition:.15s;animation:drStep .3s ease both}
.dr-opt:hover{border-color:var(--g-lt)}
.dr-opt.sel{border-color:var(--g);background:var(--g-50)}
.dr-rb{width:21px;height:21px;border-radius:50%;border:2px solid #b9c4a8;flex:0 0 21px;display:flex;align-items:center;justify-content:center}
.dr-rb.sq{border-radius:6px}
.dr-opt.sel .dr-rb{border-color:var(--g)}
.dr-opt.sel .dr-rb:after{content:"";width:11px;height:11px;border-radius:50%;background:var(--g)}
.dr-opt.sel .dr-rb.sq:after{content:"";width:9px;height:5px;border-radius:0;background:none;border-left:2px solid var(--g);border-bottom:2px solid var(--g);transform:rotate(-45deg) translateY(-1px)}
.dr-opt-m{flex:1;min-width:0}
.dr-opt-m b{font-size:13px;font-weight:800;color:var(--ink);display:block}
.dr-opt-m span{font-size:10.6px;font-weight:500;color:var(--muted);line-height:1.3;display:block}
.dr-opt-p{font:900 11.5px var(--font);color:var(--g);white-space:nowrap}

/* plocha */
.dr-area{border:1.7px solid var(--line);background:#fff;border-radius:15px;padding:15px 13px}
.dr-area-v{font-size:34px;font-weight:900;color:var(--g-dk);text-align:center;line-height:1}
.dr-area-v small{font-size:15px;color:var(--muted);font-weight:700}
.dr-slider{width:100%;margin:16px 0 5px;-webkit-appearance:none;appearance:none;height:9px;border-radius:999px;background:linear-gradient(90deg,var(--g) var(--p,30%),#e0e9d3 var(--p,30%));outline:none}
.dr-slider::-webkit-slider-thumb{-webkit-appearance:none;width:27px;height:27px;border-radius:50%;background:var(--g);border:4px solid #fff;box-shadow:0 3px 9px rgba(46,74,17,.4);cursor:pointer;transition:transform .1s}
.dr-slider::-webkit-slider-thumb:active{transform:scale(1.15)}
.dr-slider::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:var(--g);border:4px solid #fff;cursor:pointer}
.dr-scale{display:flex;justify-content:space-between;font:700 10px var(--font);color:var(--muted)}
.dr-quick{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
.dr-quick button{flex:1;min-width:56px;border:1px solid var(--line);background:#fff;border-radius:10px;padding:8px 4px;font:800 11px var(--font);color:var(--g-dk);cursor:pointer;transition:.15s}
.dr-quick button:hover,.dr-quick button.on{background:var(--g-50);border-color:var(--g-lt)}

/* výsledok */
.dr-result{position:relative;overflow:hidden;border:1px solid rgba(64,102,24,.24);border-radius:var(--r);background:linear-gradient(150deg,#f1f8ea,#fff);padding:15px;box-shadow:0 10px 26px rgba(46,74,17,.08);margin-bottom:11px}
.dr-result .lbl{font:900 9.5px var(--font);text-transform:uppercase;letter-spacing:.7px;color:var(--g)}
.dr-result .price{font-size:34px;font-weight:900;color:var(--g-dk);line-height:1;margin-top:5px}
.dr-result .price #dr-price{display:inline-block}

.dr-lf input:focus,.dr-lf textarea:focus{border-color:var(--g-lt);background:#fff}
.dr-lf textarea{min-height:54px;resize:vertical}
.dr-cons{display:flex;gap:8px;align-items:flex-start;font:500 10.4px/1.35 var(--font);color:var(--muted)}
.dr-cons input{width:17px!important;height:17px!important;flex:0 0 17px;accent-color:var(--g)}
.dr-stat{display:none;border-radius:11px;padding:9px 11px;font:700 11.5px var(--font)}
.dr-stat.show{display:block;animation:drStep .25s}
.dr-stat.err{background:#fdeeeb;color:var(--red-dk);border:1px solid #f3c4bb}
.dr-stat.ok{background:#eef7e6;color:#2e6b16;border:1px solid #c6e4b0}
.dr-lf-btns{display:flex;gap:8px}
.dr-submit{flex:1;border:0;border-radius:13px;background:linear-gradient(135deg,#406618,#2e4a11);color:#fff;font:900 13px var(--font);padding:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:.15s}

.dr-wabtn{flex:0 0 auto;border:0;border-radius:13px;background:var(--wa);color:#fff;padding:0 15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}

};
/* Rozsah = počet potrebných zásahov → výrazne ovplyvňuje cenu */
const SEVERITY={
  mierne:{n:'Mierne',d:'Ojedinelý výskyt, skôr prevencia.',m:.85,v:'1 zásah'},
  stredne:{n:'Stredné',d:'Pravidelný výskyt na viacerých miestach.',m:1,v:'1–2 zásahy'},

};
const ADDONS={
  protokol:{n:'Písomné potvrdenie o zásahu',d:'Doklad pre úrady a kontroly (napr. v gastre).',p:19},
  monitoring:{n:'Celoročný dohľad (12 mes.)',d:'Pravidelné kontroly a nástrahy proti návratu škodcov.',p:79},
  expres:{n:'Expresný zásah',d:'Prídeme do 24 hodín alebo cez víkend.',p:35},
  hniezda:{n:'Odstránenie hniezd',d:'Bezpečná likvidácia hniezd ôs a sršňov.',p:29}
};
const PROCESS='<b>Ako prebieha zásah:</b> obhliadka a konzultácia → návrh riešenia a cena → zásah certifikovaným prípravkom → protokol a podľa potreby kontrolný zásah. Na zásahy poskytujeme garanciu.';
const STEPS=['service','sub','place','area','severity','addons','result'];
const QUESTIONS={
  service:['S čím vám môžeme pomôcť?','Vyberte službu — ukážka aj ceny sa prispôsobia.'],

  place:['O aký priestor ide?','Typ priestoru ovplyvňuje rozsah aj cenu.'],

  addons:['Pridáte doplnkové služby?','Voliteľné — pokojne preskočte.'],

const MIN=69;
const state={open:false,step:0,c:{service:'deratizacia',sub:'potkany',place:'byt',area:60,severity:'stredne',addons:[]}};

const $=s=>document.getElementById(s);

const esc=s=>String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const unit=()=>SERVICES[state.c.service].unit;

function add(html,who){const r=document.createElement('div');r.className='dr-row '+(who||'bot');r.innerHTML=(who==='me'?'':'<span class="dr-av">'+MOUSE+'</span>')+'<div class="dr-b '+(who||'bot')+'">'+html+'</div>';msgs.appendChild(r);msgs.scrollTop=msgs.scrollHeight;}
function bot(html){const r=document.createElement('div');r.className='dr-row bot';r.innerHTML='<span class="dr-av">'+MOUSE+'</span><div class="dr-b bot"><div class="dr-typing"><span></span><span></span><span></span></div></div>';msgs.appendChild(r);msgs.scrollTop=msgs.scrollHeight;setTimeout(()=>{r.querySelector('.dr-b').innerHTML=html;msgs.scrollTop=msgs.scrollHeight;},650);}
function reply(t){const x=t.toLowerCase();
  if(/(cena|stoj|koľko|kolko|cenn|lacn)/.test(x))return 'Cena závisí od služby, druhu škodcu, plochy a rozsahu. Najrýchlejšie ju zistíte v <b>kalkulačke</b> — kliknite na „Spočítať cenu". Presnú ponuku potvrdíme po obhliadke.';
  if(/(my[šs]|potkan|hlodav|hraboš|hrabos|hryz)/.test(x))return 'Hlodavce (potkany, myši, hraboše) riešime <b>deratizáciou</b> — chemickými nástrahami alebo odchytovými klietkami a pascami. V kalkulačke vyberte Deratizáciu.';
  if(/(šváb|svab|rus|hmyz|mravc|ploštic|plostic|blch|much)/.test(x))return 'Lezúci aj lietajúci hmyz likvidujeme <b>dezinsekciou</b> — postrekom, zadymovaním, plynovaním či nástrahami. Pri plošticiach odporúčame opakovaný zásah.';
  if(/(os[ay]|sršn|srsn|včel|hniezd)/.test(x))return 'Hniezda ôs a sršňov odstraňujeme bezpečne. V kalkulačke zvoľte Dezinsekcia → Osy/sršne a doplnok „Likvidácia hniezd".';
  if(/(plesn|baktér|bakter|vírus|virus|dezinf|covid|holub|kanaliz)/.test(x))return 'Robíme <b>polymérovú dezinfekciu</b> proti plesniam, vírusom a baktériám — vhodnú aj počas COVID-19, po havárii kanalizácie či pri výskyte holubov.';
  if(/(postup|prebieha|ako to|obhliad|zásah|zasah|garanc)/.test(x))return PROCESS;
  if(/(bezpeč|bezpec|deti|dieťa|dieta|zviera|domác|pes|mač)/.test(x))return 'Používame certifikované prípravky a moderné technológie s ohľadom na účinnosť aj životné prostredie. Po zásahu odovzdáme pokyny ohľadom detí a domácich zvierat.';
  if(/(kde|región|region|okres|mesto|bratislav|dojazd|cestuj)/.test(x))return 'Pôsobíme po celom Slovensku, ťažisko Bratislava a okolie. Termín a dojazd potvrdíme telefonicky na '+CONFIG.phoneText+'.';
  if(/(ahoj|dobrý|dobry|zdrav|čau|cau)/.test(x))return 'Dobrý deň 👋 Akého škodcu riešite — myši, šváby, ploštice, plesne? Alebo otvorte <b>kalkulačku</b> pre orientačnú cenu.';
  return 'Pomôžem so škodcami — deratizácia, dezinsekcia a dezinfekcia. Napíšte konkrétneho škodcu, otvorte <b>kalkulačku</b>, alebo zavolajte na '+CONFIG.phoneText+'.';
}

/* =========================================================
   4) VÝPOČET – cena za 1 zásah × počet zásahov (rozsah)
   ========================================================= */
function compute(){
  const c=state.c,sv=SERVICES[c.service],sub=sv.subs[c.sub],pl=PLACES[c.place],sev=SEVERITY[c.severity];
  const qty=sv.unit==='ks'?Math.max(1,c.area):c.area;
  const perVisit=sv.base+sv.rate*qty*sub.m*pl.m;        // cena jedného zásahu
  const adds=c.addons.reduce((a,id)=>a+(ADDONS[id]?ADDONS[id].p:0),0);
  let sum=perVisit*sev.m+adds;                          // × počet zásahov
  if(sum<MIN)sum=MIN;
  const total=Math.round(sum);
  return{sv,sub,pl,sev,qty,unit:sv.unit,perVisit:Math.round(perVisit),adds,total,low:Math.round(total*.9),high:Math.round(total*1.2),vat:Math.round(total*1.23)};
}

function hero(){

}

function rPlace(){return Object.keys(PLACES).map((id,i)=>{const p=PLACES[id],sel=state.c.place===id;
  const vis=IMG[id]?`<span class="dr-pcard-img" style="background-image:url('${IMG[id]}')"></span>`:`<span class="dr-pcard-svg">${I.biz}</span>`;
  return `<button class="dr-pcard${sel?' sel':''}" data-grp="place" data-id="${id}" style="animation-delay:${i*40}ms" onclick="DERAT.pickPlace('${id}',this)">${vis}<span class="dr-pcard-bd"><b>${p.n}</b><span>${p.d}</span></span></button>`;}).join('');}
function rArea(){const u=unit(),a=state.c.area,ks=u==='ks',min=ks?1:10,max=ks?40:1000,step=ks?1:5,p=Math.round((a-min)/(max-min)*100);
  const quick=ks?[1,3,8,15,30]:[40,80,150,300,600];
  return `<div class="dr-area">
    <div class="dr-area-v" id="dr-av">${a} <small>${u}</small></div>
    <input class="dr-slider" type="range" min="${min}" max="${max}" step="${step}" value="${a}" style="--p:${p}%" oninput="DERAT.area(+this.value)">
    <div class="dr-scale"><span>${min} ${u}</span><span>${max}+ ${u}</span></div>
    <div class="dr-quick">${quick.map(v=>`<button class="${v===a?'on':''}" onclick="DERAT.area(${v})">${v} ${u}</button>`).join('')}</div>
  </div>`;}
function rSeverity(){return `<div class="dr-list">`+Object.keys(SEVERITY).map((id,i)=>{const s=SEVERITY[id],sel=state.c.severity===id;
  return `<button class="dr-opt${sel?' sel':''}" data-grp="severity" data-id="${id}" style="animation-delay:${i*45}ms" onclick="DERAT.pickSeverity('${id}',this)"><span class="dr-rb"></span><span class="dr-opt-m"><b>${s.n}</b><span>${s.d}</span></span><span class="dr-opt-p">${s.v}</span></button>`;}).join('')+`</div>`;}
function rAddons(){const set=new Set(state.c.addons);return `<div class="dr-list">`+Object.keys(ADDONS).map((id,i)=>{const a=ADDONS[id],sel=set.has(id);
  return `<button class="dr-opt${sel?' sel':''}" data-grp="addon" data-id="${id}" style="animation-delay:${i*35}ms" onclick="DERAT.addon('${id}',this)"><span class="dr-rb sq"></span><span class="dr-opt-m"><b>${a.n}</b><span>${a.d}</span></span><span class="dr-opt-p">+${eur(a.p)}</span></button>`;}).join('')+`</div>`;}
function rResult(){const r=compute(),c=state.c;
  return `<div class="dr-result">
    <div class="lbl">Orientačná cena (bez DPH)</div>
    <div class="price"><span class="from">od</span><span id="dr-price" data-t="${r.total}">${eur(r.total)}</span></div>
    <div class="rng">Zvyčajne ${eur(r.low)} – ${eur(r.high)} · s DPH ~ ${eur(r.vat)}</div>
    <div class="dr-bd">
      <div class="dr-bd-r"><span>${r.sv.name} – ${r.sub.n}</span><b>${r.pl.n}</b></div>
      <div class="dr-bd-r"><span>Cena za 1 zásah · ${r.qty} ${r.unit}</span><b>${eur(r.perVisit)}</b></div>
      <div class="dr-bd-r"><span>Rozsah: ${r.sev.n}</span><b>${r.sev.v}</b></div>
      ${r.adds?`<div class="dr-bd-r"><span>Doplnky</span><b>+${eur(r.adds)}</b></div>`:''}
      <div class="dr-bd-r tot"><span>Spolu orientačne</span><b>${eur(r.total)}</b></div>

  </div>
  <div class="dr-lead">
    <div class="dr-lead-h"><span class="ic"><svg viewBox="0 0 24 24"><path d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2Zm0 4-8 5-8-5V6l8 5 8-5v2Z"/></svg></span><span><b>Kam vám pošleme ponuku?</b><small>Ozveme sa s presnou cenou a termínom.</small></span></div>
    <div class="dr-lf">

        <button class="dr-submit" onclick="DERAT.send()"><svg viewBox="0 0 24 24"><path d="M2 21 23 12 2 3v7l15 2-15 2v7Z"/></svg> Odoslať dopyt</button>
        <button class="dr-wabtn" onclick="DERAT.sendWa()" title="Poslať cez WhatsApp"><svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 0 0-8.6 15l-1.3 4.6 4.8-1.3A10 10 0 1 0 12 2Zm0 2a8 8 0 1 1-4.2 14.8l-.3-.2-2.5.7.7-2.4-.2-.3A8 8 0 0 1 12 4Zm4.4 10.3c-.2-.1-1.4-.7-1.6-.8-.2-.1-.4-.1-.5.1l-.7.9c-.1.2-.3.2-.5.1a6.5 6.5 0 0 1-3.2-2.8c-.1-.2 0-.4.1-.5l.4-.5c.1-.1.1-.3 0-.4l-.7-1.7c-.2-.4-.4-.4-.5-.4h-.5c-.2 0-.4.1-.6.3-.7.7-.7 1.7-.1 2.7a9 9 0 0 0 3.9 3.6c1.2.5 1.7.5 2.3.4.4 0 1.2-.5 1.4-1 .2-.5.2-.9.1-1Z"/></svg></button>

function stepInner(){const k=STEPS[state.step];
  if(k==='service')return '<div class="dr-rows">'+rService()+'</div>';
  if(k==='sub')return info(SERVICES[state.c.service].info)+'<div class="dr-grid tri">'+rSub()+'</div>';
  if(k==='place')return '<div class="dr-grid">'+rPlace()+'</div>';
  if(k==='area')return info('<b>Rozloha</b> je približná podlahová plocha v metroch štvorcových (m²). Bežný byt má 50–80 m², rodinný dom 100–150 m². Nemusíte to vedieť presne — upravíme pri obhliadke.')+rArea();
  if(k==='severity')return info('Čím rozsiahlejší výskyt, tým <b>viac zásahov</b> býva potrebných na úplné odstránenie — preto rastie aj cena.')+rSeverity();
  if(k==='addons')return rAddons();
  return rResult();}

function render(keep){
  const ob=calc.querySelector('.dr-body'),sc=keep&&ob?ob.scrollTop:0;
  const k=STEPS[state.step],n=STEPS.length,prog=Math.round((state.step+1)/n*100),last=k==='result',first=state.step===0;
  const q=QUESTIONS[k],title=(k==='sub')?SERVICES[state.c.service].q:q[0],r=compute();
  calc.innerHTML=`
  <div class="dr-chead"><b>Cenová kalkulačka</b><button class="dr-x" onclick="DERAT.closeCalc()">×</button></div>
  <div class="dr-prog"><button class="dr-back" onclick="DERAT.prev()" ${first?'disabled':''}>‹</button><div class="dr-prog-track"><div class="dr-prog-fill" style="width:${prog}%"></div></div><div class="dr-prog-n">${state.step+1}/${n}</div></div>
  <div class="dr-body">
    <div class="dr-hero">${hero()}</div>
    <h3 class="dr-q">${title}</h3><div class="dr-q-sub">${q[1]}</div>
    <div class="dr-stepbox" style="animation:drStep .3s ease">${stepInner()}</div>
  </div>
  <div class="dr-actions">
    ${state.step>=1&&!last?`<div class="dr-live-price"><small>od</small><b>${eur(r.total)}</b></div>`:''}
    <button class="dr-next" onclick="DERAT.next()">${last?'↺ Začať odznova':'Pokračovať ›'}</button>
  </div>`;
  const nb=calc.querySelector('.dr-body');if(nb)nb.scrollTop=sc;
  if(last)countUp();
}
function countUp(){const el=$('dr-price');if(!el)return;const t=+el.dataset.t,t0=performance.now(),dur=1100;
  (function tick(now){const p=Math.min(1,(now-t0)/dur),e=1-Math.pow(1-p,4),v=Math.round(t*e);el.textContent=v.toLocaleString('sk-SK')+' €';
    if(p<1)requestAnimationFrame(tick);else{el.classList.remove('pop');void el.offsetWidth;el.classList.add('pop');confetti();}})(t0);}
function confetti(){const host=calc.querySelector('.dr-result');if(!host)return;
  const wrap=document.createElement('div');wrap.className='dr-confetti';
  const cols=['#406618','#5a8a24','#a6f06f','#c63a27','#e7b400','#fff'];
  for(let i=0;i<26;i++){const s=document.createElement('i');
    s.style.cssText=`left:${10+Math.random()*80}%;background:${cols[i%cols.length]};animation-delay:${Math.random()*.25}s;transform:rotate(${Math.random()*360}deg)`;
    wrap.appendChild(s);}
  host.appendChild(wrap);setTimeout(()=>wrap.remove(),1700);}

/* =========================================================
   6) API
   ========================================================= */
window.DERAT={
  contact(k){const el=$('dr-'+k);if(!el)return;
    el.classList.remove('tap');void el.offsetWidth;el.classList.add('tap');
    const url=CONTACT_URL[k];
    setTimeout(()=>{k==='wa'?window.open(url,'_blank','noopener'):window.location.href=url;},180);
  },
  toggle(){state.open?this.close():this.open();},
  open(){state.open=true;chat.classList.add('show');chat.setAttribute('aria-hidden','false');$('derat-bubble').classList.add('open');
    if(!msgs.dataset.i){add('Dobrý deň 👋 Som <b>DERAT asistent</b>. Pomôžem so škodcami — <b>deratizácia, dezinsekcia a dezinfekcia</b>. Napíšte, čo riešite, alebo si v <b>kalkulačke</b> spočítajte orientačnú cenu.','bot');msgs.dataset.i='1';}},
  close(){state.open=false;chat.classList.remove('show','calc');chat.setAttribute('aria-hidden','true');$('derat-bubble').classList.remove('open');},
  openCalc(){this.open();chat.classList.add('calc');render();},
  closeCalc(){chat.classList.remove('calc');},
  submit(e){e.preventDefault();const v=inp.value.trim();if(!v)return;inp.value='';add(esc(v),'me');bot(reply(v));},
  quick(t){this.open();add(esc(t),'me');bot(reply(t));},
  _markOne(grp,el){document.querySelectorAll('.dr-body [data-grp="'+grp+'"]').forEach(b=>b.classList.toggle('sel',b===el));},
  _livePrice(){const lp=document.querySelector('.dr-live-price b');if(lp)lp.textContent=eur(compute().total);},
  _hero(){const h=calc.querySelector('.dr-hero');if(h)h.innerHTML=hero();},
  pickService(id,el){state.c.service=id;state.c.sub=Object.keys(SERVICES[id].subs)[0];this._markOne('service',el);this._hero();this._livePrice();},
  pickSub(id,el){state.c.sub=id;this._markOne('sub',el);this._hero();this._livePrice();},
  pickPlace(id,el){state.c.place=id;if(unit()!=='ks')state.c.area=PLACES[id].a;this._markOne('place',el);this._hero();this._livePrice();},
  pickSeverity(id,el){state.c.severity=id;this._markOne('severity',el);this._livePrice();},
  area(v){state.c.area=v;const u=unit(),el=$('dr-av');if(el){el.innerHTML=v+' <small>'+u+'</small>';const s=document.querySelector('.dr-slider');if(s){const ks=u==='ks',min=ks?1:10,max=ks?40:1000;s.style.setProperty('--p',Math.round((v-min)/(max-min)*100)+'%');s.value=v;}document.querySelectorAll('.dr-quick button').forEach(b=>b.classList.toggle('on',b.textContent.trim()===v+' '+u));this._livePrice();}},
  addon(id,el){const a=state.c.addons,i=a.indexOf(id);i>=0?a.splice(i,1):a.push(id);if(el)el.classList.toggle('sel',i<0);this._livePrice();},
  next(){state.step<STEPS.length-1?state.step++:(state.step=0);render(false);},
  prev(){if(state.step>0)state.step--;render(false);},
  _payload(){const r=compute(),c=state.c;return{
    name:$('dr-name').value.trim(),phone:$('dr-phone').value.trim(),email:$('dr-email').value.trim(),
    loc:$('dr-loc').value.trim(),note:$('dr-note').value.trim(),
    service:r.sv.name,pest:r.sub.n,place:r.pl.n,size:r.qty+' '+r.unit,severity:r.sev.n+' ('+r.sev.v+')',
    addons:c.addons.map(id=>ADDONS[id].n).join(', ')||'žiadne',price:r.total,priceRange:eur(r.low)+'–'+eur(r.high)};},
  _summary(p){return `DOPYT z kalkulačky DERAT.sk
Služba: ${p.service} – ${p.pest}
Priestor: ${p.place}, ${p.size}
Rozsah: ${p.severity}
Doplnky: ${p.addons}
Orientačná cena: od ${eur(p.price)} bez DPH (${p.priceRange})
---
Meno: ${p.name}
Telefón: ${p.phone}
E-mail: ${p.email||'-'}
Lokalita: ${p.loc||'-'}
Poznámka: ${p.note||'-'}`;},
  _valid(p){const st=$('dr-stat');
    if(!p.name||!p.phone){st.className='dr-stat show err';st.textContent='Vyplňte aspoň meno a telefón.';return false;}
    if(!$('dr-consent').checked){st.className='dr-stat show err';st.textContent='Potvrďte prosím súhlas so spracovaním údajov.';return false;}
    return true;},
  send(){const p=this._payload();if(!this._valid(p))return;const st=$('dr-stat');
    const ok=()=>{st.className='dr-stat show ok';st.textContent='Ďakujeme! Dopyt odoslaný — čoskoro sa vám ozveme.';};
    const ej=CONFIG.emailjs;
    if(ej.publicKey&&ej.serviceId&&ej.templateId&&window.emailjs){
      emailjs.send(ej.serviceId,ej.templateId,p).then(ok).catch(()=>{st.className='dr-stat show err';st.textContent='Odoslanie zlyhalo. Skúste WhatsApp alebo zavolajte na '+CONFIG.phoneText+'.';});return;}
    if(CONFIG.leadEndpoint){
      fetch(CONFIG.leadEndpoint,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)}).then(r=>{if(!r.ok)throw 0;ok();}).catch(()=>{st.className='dr-stat show err';st.textContent='Odoslanie zlyhalo. Zavolajte na '+CONFIG.phoneText+'.';});return;}
    window.location.href='mailto:'+CONFIG.email+'?subject='+encodeURIComponent('Dopyt z kalkulačky – '+p.service)+'&body='+encodeURIComponent(this._summary(p));ok();},
  sendWa(){const p=this._payload();if(!this._valid(p))return;
    window.open('https://wa.me/'+CONFIG.whatsapp+'?text='+encodeURIComponent(this._summary(p)),'_blank');
    const st=$('dr-stat');st.className='dr-stat show ok';st.textContent='Otvárame WhatsApp s predvyplneným dopytom…';}
};
})();
</script>
