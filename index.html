<title>Vaša Sauna widget</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--dark:#17120e;--brown:#5a341d;--copper:#c47a2c;--amber:#edb65d;--cream:#fff7ea;--line:#ead3b2;--muted:#806d5c;--font:'Inter',system-ui,-apple-system,Segoe UI,sans-serif}*{box-sizing:border-box}body{margin:0;background:transparent;font-family:var(--font)}
#vs-teaser{position:fixed;right:16px;bottom:86px;z-index:99998;max-width:270px;padding:12px 38px 12px 14px;border-radius:16px;background:rgba(255,247,234,.96);border:1px solid rgba(196,122,44,.32);box-shadow:0 14px 34px rgba(23,18,14,.16);font:800 12.5px/1.35 var(--font);color:#241711;opacity:0;transform:translateY(8px);pointer-events:none;transition:.25s}#vs-teaser.show{opacity:1;transform:translateY(0);pointer-events:auto}#vs-teaser button{position:absolute;right:7px;top:7px;width:24px;height:24px;border:0;border-radius:50%;background:rgba(38,24,15,.08);cursor:pointer;color:#7c6a59}
#vasasauna-bubble{position:fixed;right:16px;bottom:16px;z-index:100000;width:62px;height:62px;border:0;border-radius:50%;background:radial-gradient(circle at 32% 20%,#fff1c7 0,#f2a64a 42%,#8e421f 100%);box-shadow:0 16px 34px rgba(196,122,44,.34),0 0 0 8px rgba(196,122,44,.11);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.25s;overflow:hidden}#vasasauna-bubble:hover{transform:translateY(-2px) scale(1.04)}#vasasauna-bubble.open{opacity:0;pointer-events:none;transform:scale(.86)}.vs-notify{position:absolute;right:5px;top:5px;width:13px;height:13px;border-radius:50%;background:#ef5b35;border:3px solid #fff7ea}
.vs-avatar,.vs-mini-av,.vs-bubble-mark{border-radius:50%;background:linear-gradient(145deg,#fff9ef,#ecd6b4);border:1px solid rgba(207,166,112,.5);display:flex;align-items:center;justify-content:center;overflow:hidden;flex:0 0 auto}.vs-bubble-mark{width:42px;height:42px}.vs-avatar{width:38px;height:38px}.vs-mini-av{width:30px;height:30px}.vs-bot-svg{width:100%;height:100%;display:block}
#vasasauna-chat{position:fixed;right:16px;bottom:88px;z-index:99999;width:340px;height:min(80vh,590px);max-height:590px;border-radius:22px;background:linear-gradient(180deg,#fffdf9,#fff4e4);border:1px solid rgba(196,122,44,.25);box-shadow:0 22px 64px rgba(23,18,14,.24);display:flex;flex-direction:column;overflow:hidden;opacity:0;pointer-events:none;transform:translateY(18px) scale(.95);transform-origin:bottom right;transition:.25s}#vasasauna-chat.visible{opacity:1;pointer-events:auto;transform:translateY(0) scale(1)}
.vs-header{padding:10px 11px;background:linear-gradient(135deg,#20140f,#71411f 55%,#d29a54);color:#fff;display:flex;align-items:center;gap:8px}.vs-head{min-width:0;flex:1}.vs-title{font-size:13.5px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.vs-sub{font-size:10.5px;font-weight:800;color:rgba(255,245,233,.83);display:flex;gap:6px;align-items:center}.vs-online{width:7px;height:7px;border-radius:50%;background:#39d37b;box-shadow:0 0 0 5px rgba(57,211,123,.15)}.vs-actions-head{display:flex;gap:6px}.vs-icon{width:32px;height:32px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.14);color:#fff;border-radius:11px;display:flex;align-items:center;justify-content:center;cursor:pointer}.vs-icon svg{width:17px;height:17px;fill:currentColor}
.vs-top{padding:10px 11px 6px;background:#fffdf9;border-bottom:1px solid rgba(234,212,182,.7)}.vs-config-cta{width:100%;border:1px solid rgba(196,122,44,.34);border-radius:15px;background:linear-gradient(135deg,#fff,#f5e5ce);box-shadow:0 8px 20px rgba(80,44,18,.08);padding:9px 10px;display:grid;grid-template-columns:38px 1fr auto;gap:9px;align-items:center;text-align:left;cursor:pointer}.vs-config-ico,.vs-contact-ico{background:linear-gradient(135deg,#f9deb4,#cf843d);color:#2e180d;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 14px rgba(207,132,61,.2)}.vs-config-ico{width:38px;height:38px;border-radius:13px}.vs-config-ico svg{width:21px;height:21px;fill:currentColor}.vs-config-title{font-size:12.5px;font-weight:900;color:#271a12}.vs-config-sub{font-size:10.4px;font-weight:750;color:var(--muted);line-height:1.3}.vs-arrow{font-size:23px;color:var(--copper);font-weight:900}
.vs-messages{flex:1;overflow:auto;padding:10px 11px 0;display:flex;flex-direction:column;gap:8px;background:radial-gradient(circle at 8% 0%,rgba(237,182,93,.14),transparent 30%),linear-gradient(180deg,#fffdf9,#fff8ec)}.vs-row{display:flex;gap:8px;align-items:flex-end}.vs-row.user{justify-content:flex-end}.vs-row.user .vs-mini-av{display:none}.vs-msg{max-width:82%;padding:9px 11px;border-radius:16px;font:650 12.5px/1.45 var(--font);box-shadow:0 7px 20px rgba(51,31,18,.06)}.vs-msg.bot{background:#fff;border:1px solid rgba(226,205,178,.86);color:#2c211a;border-bottom-left-radius:7px}.vs-msg.user{background:linear-gradient(135deg,#c1772c,#6a3b1f);color:#fff;border-bottom-right-radius:7px}
.vs-chips{display:flex;gap:6px;flex-wrap:wrap;padding:0 11px 8px;background:#fff8ec}.vs-chip{border:1px solid rgba(196,122,44,.25);background:#fff;border-radius:999px;color:#4e3423;padding:6px 9px;font:850 11px var(--font);cursor:pointer}.vs-inputbar{display:flex;gap:7px;align-items:center;margin:0 11px 9px;padding:7px;border:1px solid rgba(222,197,164,.8);border-radius:15px;background:#fff;box-shadow:0 8px 20px rgba(59,36,18,.07)}.vs-input{flex:1;height:38px;border:1.4px solid var(--line);border-radius:12px;background:#fff9ee;padding:0 11px;font:750 12.5px var(--font);outline:none}.vs-send{width:38px;height:38px;border:0;border-radius:12px;background:linear-gradient(135deg,#d08a43,#6a3a1f);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer}.vs-send svg{width:17px;fill:currentColor}
.vs-contactbar{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:7px;padding:8px 10px 10px;background:linear-gradient(180deg,#fffaf3,#f7ecdc);border-top:1px solid rgba(214,185,149,.55);order:9}.vs-contact{min-width:0;min-height:48px;text-decoration:none;color:#4f3422;border:1px solid rgba(205,161,110,.62);background:linear-gradient(180deg,#fffdf9,#f4e8d9);border-radius:13px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:4px;font:900 11px/1.05 var(--font)}.vs-contact-ico{width:27px;height:27px;border-radius:10px}.vs-contact-ico svg{width:14px;height:14px;fill:currentColor}
.vs-calc{display:none;flex:1;min-height:0;overflow:auto;padding:10px 11px 12px;background:linear-gradient(180deg,#fbf7f0,#f4ecdf);order:2}#vasasauna-chat.calc-open .vs-messages,#vasasauna-chat.calc-open .vs-chips,#vasasauna-chat.calc-open .vs-inputbar,#vasasauna-chat.calc-open .vs-top{display:none}#vasasauna-chat.calc-open .vs-calc{display:block}#vasasauna-chat.calc-open .vs-contactbar{display:grid}
.vs-calc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}.vs-calc-head h3{margin:0;font-size:14px;font-weight:950;color:#241711}.vs-calc-close{width:30px;height:30px;border-radius:11px;border:1px solid var(--line);background:#fff;color:#7c6a59;font-size:20px;cursor:pointer}.vs-progress{display:flex;gap:8px;align-items:center;padding:5px;margin-bottom:9px;border:1px solid rgba(232,210,180,.78);border-radius:999px;background:#fffaf4}.vs-back{width:29px;height:29px;border-radius:50%;border:1px solid var(--line);background:#fff;font-weight:900;cursor:pointer}.vs-back:disabled{opacity:.35}.vs-bar{height:7px;flex:1;background:#ecd4ad;border-radius:999px;overflow:hidden}.vs-bar-fill{height:100%;background:linear-gradient(90deg,#6b3b1f,#c47a2c,#edb65d)}.vs-count{font-size:10.5px;font-weight:900;color:var(--copper)}
.vs-preview{border-radius:18px;background:#f6eee1;box-shadow:0 12px 24px rgba(60,36,20,.08);border:1px solid rgba(214,185,149,.44);overflow:hidden;margin-bottom:9px}.vs-scene{position:relative;aspect-ratio:16/10;overflow:hidden;background:linear-gradient(180deg,#d8d1c7,#9d9084)}.vs-scene:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 18% 55%,rgba(255,255,255,.7) 0 4px,transparent 5px),linear-gradient(90deg,rgba(255,255,255,.28),transparent 38%)}.vs-scene.interier{background:linear-gradient(180deg,#d7d0c7,#988c80)}.vs-scene.exterier{background:linear-gradient(180deg,#93b486 0 34%,#d6b37d 35%,#a6713b 100%)}.vs-scene.zabudovana{background:linear-gradient(180deg,#bfb7ad,#6b6259)}.vs-scene.zabudovana:after{content:"";position:absolute;left:3%;top:8%;width:31%;height:68%;border-radius:12px;background:linear-gradient(90deg,rgba(65,52,45,.62),rgba(255,255,255,.1));border:2px solid rgba(255,226,183,.25)}.vs-sauna{position:absolute;left:18%;right:8%;bottom:12%;height:64%;border-radius:10px;background:linear-gradient(90deg,#e9bc7d,#c78b4c);box-shadow:0 22px 38px rgba(32,18,10,.2),inset 0 0 0 2px rgba(90,52,25,.14)}.vs-sauna:before{content:"";position:absolute;left:5%;top:8%;width:43%;height:80%;border-radius:8px;background:repeating-linear-gradient(0deg,#d89c59 0 13px,#b87637 13px 15px)}.vs-sauna:after{content:"";position:absolute;right:5%;top:8%;width:43%;height:80%;border-radius:9px;background:linear-gradient(125deg,rgba(255,255,255,.55),rgba(105,74,48,.18));border:2px solid rgba(255,235,204,.62)}.vs-roof{position:absolute;left:15%;right:5%;bottom:76%;height:6%;border-radius:6px;background:#25211e}.vs-bench{position:absolute;left:28%;right:26%;bottom:31%;height:8px;border-radius:9px;background:#7c4725;box-shadow:0 18px 0 rgba(124,71,37,.9)}.vs-stove{position:absolute;right:13%;bottom:12%;width:30px;height:42px;border-radius:10px 10px 7px 7px;background:linear-gradient(180deg,#514b45,#211d19)}.vs-heat{display:none;position:absolute;left:24%;top:21%;width:18px;height:62px;border-radius:8px;background:#2b1b12;box-shadow:35px 0 0 #2b1b12,70px 0 0 #2b1b12}.vs-heat:before,.vs-heat:after{content:"";position:absolute;inset:6px;border-radius:7px;background:#d86a35;box-shadow:35px 0 0 #d86a35,70px 0 0 #d86a35}.vs-scene.infra .vs-stove{display:none}.vs-scene.infra .vs-heat,.vs-scene.combi .vs-heat{display:block}.vs-scene.combi .vs-heat{left:19%;transform:scale(.78);transform-origin:left top}.vs-scene.combi .vs-sauna{background:linear-gradient(90deg,#e2af70,#9f6235)}.vs-scene.infra .vs-sauna{background:linear-gradient(90deg,#f0c98e,#d59653)}.vs-scene.large .vs-sauna{left:10%;right:5%;height:69%}.vs-scene.compact .vs-sauna{left:30%;right:15%;height:58%}
.vs-sample{position:relative;aspect-ratio:16/10;overflow:hidden}.wood-smrek{background:linear-gradient(90deg,#e7c391,#c9945d)}.wood-thermo{background:linear-gradient(90deg,#6b3e25,#3f2112)}.wood-osika{background:linear-gradient(90deg,#f3dfba,#dfc79c)}.wood-premium{background:repeating-linear-gradient(90deg,#e6c18a 0 80px,#8a512d 80px 160px,#f0deb7 160px 240px,#5a331b 240px 320px)}.vs-sample.wood:after{content:"";position:absolute;inset:0;background:repeating-linear-gradient(90deg,rgba(255,255,255,.16) 0 4px,rgba(45,25,11,.08) 4px 7px),radial-gradient(ellipse at 30% 35%,rgba(73,38,15,.14),transparent 15%),radial-gradient(ellipse at 68% 60%,rgba(73,38,15,.10),transparent 14%)}.glass-standard{background:linear-gradient(125deg,rgba(255,255,255,.9),rgba(185,217,235,.42),rgba(255,255,255,.58))}.glass-panorama{background:linear-gradient(125deg,rgba(255,255,255,.9),rgba(154,205,235,.45),rgba(255,255,255,.55))}.glass-bronze{background:linear-gradient(125deg,rgba(255,244,222,.72),rgba(142,86,46,.55),rgba(255,237,205,.38))}.vs-sample.glass:after{content:"";position:absolute;inset:12% 10%;border-radius:18px;border:2px solid rgba(255,255,255,.72);box-shadow:inset 0 0 34px rgba(255,255,255,.22);background:linear-gradient(110deg,rgba(255,255,255,.42) 0 14%,transparent 15% 57%,rgba(255,255,255,.22) 58% 67%,transparent 68%)}
.vs-step-title{font-size:15px;font-weight:950;color:#241711;margin-bottom:3px}.vs-step-sub{font-size:10.8px;font-weight:750;color:#7f6a5a;line-height:1.35;margin-bottom:8px}.vs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}.vs-grid.two{grid-template-columns:repeat(2,1fr)}.vs-card,.vs-choice{border:1.4px solid var(--line);background:linear-gradient(180deg,#fffdfb,#f7efe5);border-radius:14px;cursor:pointer;text-align:left;transition:.15s}.vs-card{min-height:82px;padding:10px 9px;display:flex;flex-direction:column;justify-content:center;position:relative}.vs-card:hover,.vs-card.selected,.vs-choice:hover,.vs-choice.selected{border-color:var(--copper);box-shadow:0 0 0 3px rgba(196,122,44,.11)}.vs-card.selected:after{content:"✓";position:absolute;right:7px;top:7px;width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,#c47a2c,#6b3b1f);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:950}.vs-card-name,.vs-choice-name{font-size:11.8px;font-weight:950;color:#241711;line-height:1.16}.vs-card-desc,.vs-choice-desc{font-size:10px;font-weight:700;color:var(--muted);line-height:1.25;margin-top:4px}.vs-card-price,.vs-choice-price{font-size:10px;font-weight:950;color:var(--copper);margin-top:6px}.vs-choice-list{display:flex;flex-direction:column;gap:6px}.vs-choice{display:flex;gap:8px;align-items:flex-start;padding:8px}.vs-check{width:18px;height:18px;border-radius:6px;border:2px solid #c8a77e;flex:0 0 18px;margin-top:1px}.vs-choice.selected .vs-check{background:var(--copper);border-color:var(--copper)}.vs-choice.selected .vs-check:after{content:"";display:block;width:8px;height:4px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg) translate(-1px,4px)}.vs-choice-main{flex:1;min-width:0}.vs-choice-price{white-space:nowrap;margin-top:1px;text-align:right}.vs-swatch{width:18px;height:18px;border-radius:50%;border:1px solid rgba(23,18,14,.12);flex:0 0 18px;margin-top:1px}
.vs-summary{border:1px solid rgba(196,122,44,.28);border-radius:16px;background:linear-gradient(145deg,#fff9ee,#fff);padding:10px;box-shadow:0 8px 20px rgba(23,18,14,.05)}.vs-price-label{font-size:9.5px;text-transform:uppercase;letter-spacing:.6px;font-weight:950;color:var(--copper)}.vs-price{font-size:24px;font-weight:950;color:#241711;line-height:1;margin-top:4px}.vs-note{font-size:10.5px;line-height:1.35;color:var(--muted);font-weight:700;margin-top:6px}.vs-breakdown{border-top:1px dashed var(--line);margin-top:9px;padding-top:7px}.vs-breakrow{display:flex;justify-content:space-between;gap:8px;font-size:10.8px;color:var(--muted);font-weight:700;padding:2px 0}.vs-breakrow b{color:#241711}.vs-lead-card{margin-top:9px;border:1px solid rgba(199,125,55,.35);border-radius:16px;background:linear-gradient(145deg,#fffaf3,#f3dfc3);padding:10px}.vs-lead-head{display:flex;align-items:center;gap:9px;margin-bottom:9px;color:#2c1b12}.vs-final-ico{width:36px;height:36px;border-radius:12px;background:linear-gradient(135deg,#d8974f,#704120);display:flex;align-items:center;justify-content:center;color:#fff;flex:0 0 36px}.vs-lead-head b{font-size:13px;display:block}.vs-lead-head small{font-size:11px;color:#776150;font-weight:700;line-height:1.3}.vs-lead-form{display:grid;gap:7px}.vs-lead-row{display:grid;grid-template-columns:1fr 1fr;gap:7px}.vs-lead-form input,.vs-lead-form textarea{width:100%;border:1.4px solid rgba(214,185,149,.72);background:#fff;border-radius:12px;padding:9px 10px;font:700 12px var(--font);outline:none;color:#2d2018}.vs-lead-form textarea{min-height:56px;resize:vertical}.vs-consent{display:flex;align-items:flex-start;gap:7px;font-size:10.8px;line-height:1.25;color:#6d5948;font-weight:700}.vs-consent input{width:16px!important;height:16px!important;flex:0 0 16px;accent-color:#b46b2d}.vs-lead-status{display:none;border-radius:11px;padding:8px 9px;font-size:11px;font-weight:800}.vs-lead-status.show{display:block}.vs-lead-status.err{background:#fff1ec;color:#9a3418;border:1px solid #ffc9b8}.vs-lead-status.ok{background:#edf9ef;color:#126b2f;border:1px solid #bdeac7}.vs-send-lead{border:0;border-radius:13px;background:linear-gradient(135deg,#d08a43,#6a3a1f);color:#fff;font:900 12.5px var(--font);padding:11px;cursor:pointer}.vs-actions{display:flex;gap:8px;margin-top:9px}.vs-btn{flex:1;border:0;border-radius:13px;background:linear-gradient(135deg,#d08a43,#6a3a1f);color:#fff;font:900 12px var(--font);padding:10px;cursor:pointer}.vs-btn.secondary{flex:0 0 auto;background:#fff;color:#4e3423;border:1px solid var(--line);box-shadow:none}.vs-btn:disabled{opacity:.4;cursor:not-allowed}
@media(max-width:520px){#vasasauna-chat{inset:0!important;width:100%!important;height:100dvh!important;max-height:100dvh!important;border-radius:0;bottom:auto;right:auto;transform:translateY(100%);transform-origin:bottom center}#vasasauna-chat.visible{transform:translateY(0)}#vasasauna-bubble{right:16px;bottom:16px}.vs-header{padding-top:calc(10px + env(safe-area-inset-top))}.vs-grid{grid-template-columns:repeat(2,1fr)}.vs-contactbar{padding-bottom:calc(10px + env(safe-area-inset-bottom))}.vs-lead-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="vs-teaser">Vypočítajte si orientačnú cenu sauny na mieru.<button onclick="VSWidget.hideTeaser()">×</button></div>
<button id="vasasauna-bubble" type="button" aria-label="Otvoriť asistenta" onclick="VSWidget.toggle()"><span class="vs-bubble-mark" id="vs-bubble-icon"></span><span class="vs-notify"></span></button>
<section id="vasasauna-chat" aria-hidden="true">
<header class="vs-header"><div class="vs-avatar" id="vs-header-icon"></div><div class="vs-head"><div class="vs-title">AI asistent Vaša Sauna</div><div class="vs-sub"><span class="vs-online"></span>Online · pomôže s výberom aj cenou</div></div><div class="vs-actions-head"><button class="vs-icon" onclick="VSWidget.openCalc()" title="Konfigurátor"><svg viewBox="0 0 24 24"><path d="M4 4h16v4H4V4Zm0 6h7v10H4V10Zm9 0h7v4h-7v-4Zm0 6h7v4h-7v-4Z"/></svg></button><button class="vs-icon" onclick="VSWidget.close()" title="Zavrieť"><svg viewBox="0 0 24 24"><path d="m18.3 5.7-1.4-1.4-4.9 4.9-4.9-4.9-1.4 1.4 4.9 4.9-4.9 4.9 1.4 1.4 4.9-4.9 4.9 4.9 1.4-1.4-4.9-4.9 4.9-4.9Z"/></svg></button></div></header>
<div class="vs-top"><button class="vs-config-cta" onclick="VSWidget.openCalc()"><span class="vs-config-ico"><svg viewBox="0 0 24 24"><path d="M4 4h16v4H4V4Zm0 6h7v10H4V10Zm9 0h7v4h-7v-4Zm0 6h7v4h-7v-4Z"/></svg></span><span><span class="vs-config-title">Konfigurátor sauny</span><span class="vs-config-sub">Typ, priestor, materiál, sklo, doplnky a orientačná cena.</span></span><span class="vs-arrow">›</span></button></div>
<div id="vs-messages" class="vs-messages"></div>

<script>
(function(){
const botSvg=`<svg class="vs-bot-svg" viewBox="0 0 64 64" aria-hidden="true"><circle cx="32" cy="32" r="29" fill="#fff7eb" stroke="#d9b784" stroke-width="2"/><path d="M32 13c5 7 10 11 10 19 0 7-4.7 13-10 13s-10-6-10-13c0-5 2.1-8.3 4.8-11.4 2-2.3 3.5-4.6 5.2-7.6Z" fill="#d77b2f"/><path d="M32 24c2.5 4.2 5.2 6.3 5.2 10.2 0 3.7-2.3 6.8-5.2 6.8s-5.2-3.1-5.2-6.8c0-2.4 1.1-4.3 2.4-5.9 1.1-1.2 1.8-2.3 2.8-4.3Z" fill="#ffd36a"/></svg>`;
const DATA={types:{finska:{name:'Fínska sauna',desc:'Klasická sauna s pecou a suchým teplom.',base:6900},infra:{name:'Infrasauna',desc:'Jemné infravyžarovanie a nižšia teplota.',base:5450},combi:{name:'Kombinovaná sauna',desc:'Fínske teplo aj infra v jednom riešení.',base:8950}},places:{interier:{name:'Interiér',desc:'Wellness miestnosť alebo kúpeľňa.',mult:1},exterier:{name:'Exteriér',desc:'Samostatná sauna pri dome alebo v záhrade.',mult:1.10},zabudovana:{name:'Zabudovaná sauna',desc:'Vstavané riešenie vo wellness priestore.',mult:1.08}},sizes:{compact:{name:'Kompaktná / 1–2 osoby',desc:'Miesto na sedenie približne pre 1–2 osoby.',mult:.96},medium:{name:'Rodinná / 3–4 osoby',desc:'Miesto na sedenie približne pre 3–4 osoby.',mult:1},large:{name:'Veľká / 4–6 osôb',desc:'Miesto na sedenie približne pre 4–6 osôb.',mult:1.14}},woods:{smrek:{name:'Svetlý severský smrek',desc:'Svetlý teplý vzhľad.',mult:1,cls:'wood-smrek',sw:'#d9aa70'},thermo:{name:'Thermo drevo',desc:'Tmavšie tepelne upravené drevo.',mult:1.15,cls:'wood-thermo',sw:'#5f321d'},osika:{name:'Osika / svetlý interiér',desc:'Veľmi svetlé čisté prevedenie.',mult:1.10,cls:'wood-osika',sw:'#ead2aa'},premium:{name:'Prémiový mix',desc:'Kombinácia svetlých a tmavých tónov.',mult:1.18,cls:'wood-premium',sw:'#9a6339'}},glass:{standard:{name:'Štandardné sklo',desc:'Čisté presklenie.',price:0,cls:'glass-standard'},panorama:{name:'Panoramatické sklo',desc:'Väčšia sklenená plocha.',price:640,cls:'glass-panorama'},bronze:{name:'Bronzové tónované sklo',desc:'Jemný bronzový tón.',price:490,cls:'glass-bronze'}},options:{led:{name:'LED pásiky',desc:'Decentné svetlo v saune.',price:420},salt:{name:'Soľná stena',desc:'Viditeľný wellness prvok.',price:850},wifi:{name:'Wi‑Fi ovládanie',desc:'Ovládanie cez smart prvok.',price:250}}};
const state={open:false,step:0,choice:{type:'finska',place:'interier',size:'medium',wood:'smrek',glass:'standard',options:[]}};
const $=id=>document.getElementById(id),chat=$('vasasauna-chat'),messages=$('vs-messages'),calc=$('vs-calc'),input=$('vs-input'),teaser=$('vs-teaser');$('vs-bubble-icon').innerHTML=botSvg;$('vs-header-icon').innerHTML=botSvg;
function euro(n){return Math.round(n).toLocaleString('sk-SK')+' €'}function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function addMsg(html,who='bot'){const row=document.createElement('div');row.className='vs-row '+who;row.innerHTML=(who==='bot'?'<span class="vs-mini-av">'+botSvg+'</span>':'')+'<div class="vs-msg '+who+'">'+html+'</div>';messages.appendChild(row);messages.scrollTop=messages.scrollHeight}function reply(t){let x=t.toLowerCase();if(x.includes('cena')||x.includes('stoj'))return 'Presná cena závisí od typu, umiestnenia, skla a doplnkov. Najrýchlejšie je kliknúť na <b>Konfigurátor sauny</b>.';if(x.includes('typ'))return 'Najčastejšia je fínska sauna. Infrasauna je jemnejšia a kombinovaná spája obe možnosti.';if(x.includes('postup')||x.includes('mont'))return 'Postup: výber riešenia, zameranie priestoru, cenová ponuka, výroba a montáž.';return 'Pomôžem s výberom sauny. Pre cenu a konkrétne riešenie otvor konfigurátor.'}
function compute(){const c=state.choice,t=DATA.types[c.type],p=DATA.places[c.place],s=DATA.sizes[c.size],w=DATA.woods[c.wood],g=DATA.glass[c.glass];let base=t.base*p.mult*s.mult*w.mult;let opt=c.options.reduce((a,id)=>a+DATA.options[id].price,0);let install=Math.round(base*.1);let total=Math.round(base+g.price+opt+install);return {t,p,s,w,g,opt,install,total,vat:total*1.23}}
function cardGrid(items,key,cols=''){return '<div class="vs-grid '+cols+'">'+Object.keys(items).map(id=>{let it=items[id],sel=state.choice[key]===id,price=it.base?'od '+euro(it.base):it.price?'+'+euro(it.price):'';return `<button class="vs-card ${sel?'selected':''}" onclick="VSWidget.select('${key}','${id}')"><span class="vs-card-name">${it.name}</span><span class="vs-card-desc">${it.desc||''}</span>${price?`<span class="vs-card-price">${price}</span>`:''}</button>`}).join('')+'</div>'}
function choiceList(items,key){return '<div class="vs-choice-list">'+Object.keys(items).map(id=>{let it=items[id],sel=state.choice[key]===id,price=it.price?'+'+euro(it.price):it.mult&&it.mult!==1?(it.mult>1?'+':'')+Math.round((it.mult-1)*100)+'%':'v cene',sw=it.sw?`<span class="vs-swatch" style="background:${it.sw}"></span>`:'';return `<button class="vs-choice ${sel?'selected':''}" onclick="VSWidget.select('${key}','${id}')"><span class="vs-check"></span>${sw}<span class="vs-choice-main"><span class="vs-choice-name">${it.name}</span><span class="vs-choice-desc">${it.desc||''}</span></span><span class="vs-choice-price">${price}</span></button>`}).join('')+'</div>'}
function optionsList(){let set=new Set(state.choice.options);return '<div class="vs-choice-list">'+Object.keys(DATA.options).map(id=>{let it=DATA.options[id],sel=set.has(id);return `<button class="vs-choice ${sel?'selected':''}" onclick="VSWidget.toggleOption('${id}')"><span class="vs-check"></span><span class="vs-choice-main"><span class="vs-choice-name">${it.name}</span><span class="vs-choice-desc">${it.desc}</span></span><span class="vs-choice-price">+${euro(it.price)}</span></button>`}).join('')+'</div>'}
function previewHtml(){const c=state.choice;if(state.step===3)return `<div class="vs-preview"><div class="vs-sample wood ${DATA.woods[c.wood].cls}"></div></div>`;if(state.step===4)return `<div class="vs-preview"><div class="vs-sample glass ${DATA.glass[c.glass].cls}"></div></div>`;return `<div class="vs-preview"><div class="vs-scene ${c.type} ${c.place} ${c.size}"><span class="vs-roof"></span><span class="vs-sauna"></span><span class="vs-bench"></span><span class="vs-stove"></span><span class="vs-heat"></span></div></div>`}
function stepHtml(){let s=state.step;if(s===0)return `<div class="vs-step-title">1. Vyberte typ sauny</div><div class="vs-step-sub">Po kliknutí sa hore hneď zmení vizuál typu sauny.</div>${cardGrid(DATA.types,'type')}`;if(s===1)return `<div class="vs-step-title">2. Prostredie</div><div class="vs-step-sub">Pri zmene prostredia sa zmení pozadie preview.</div>${cardGrid(DATA.places,'place')}`;if(s===2)return `<div class="vs-step-title">3. Veľkosť sauny</div><div class="vs-step-sub">Veľkosť ukazuje približné miesto na sedenie.</div>${choiceList(DATA.sizes,'size')}`;if(s===3)return `<div class="vs-step-title">4. Materiál a farba dreva</div><div class="vs-step-sub">Hore sa mení iba drevo.</div>${choiceList(DATA.woods,'wood')}`;if(s===4)return `<div class="vs-step-title">5. Typ skla</div><div class="vs-step-sub">Hore sa mení iba sklo.</div>${cardGrid(DATA.glass,'glass','two')}`;if(s===5)return `<div class="vs-step-title">6. Doplnky</div><div class="vs-step-sub">Vyberte voliteľné doplnky.</div>${optionsList()}`;return summaryHtml()}
function summaryHtml(){let r=compute(),c=state.choice,opts=c.options.length?c.options.map(id=>DATA.options[id].name).join(', '):'bez doplnkov';return `<div class="vs-step-title">7. Zhrnutie konfigurácie</div><div class="vs-summary"><div class="vs-price-label">Orientačná cena vrátane montáže</div><div class="vs-price">${euro(r.total)} <small>bez DPH</small></div><div class="vs-note">Presná ponuka sa pripraví po zameraní a doladení detailov.</div><div class="vs-breakdown"><div class="vs-breakrow"><span>Typ sauny</span><b>${euro(r.t.base)}</b></div><div class="vs-breakrow"><span>Umiestnenie</span><b>${r.p.mult===1?'bez zmeny':Math.round((r.p.mult-1)*100)+'%'}</b></div><div class="vs-breakrow"><span>Veľkosť</span><b>${r.s.mult===1?'štandard':Math.round((r.s.mult-1)*100)+'%'}</b></div><div class="vs-breakrow"><span>Materiál</span><b>${r.w.mult===1?'v cene':Math.round((r.w.mult-1)*100)+'%'}</b></div><div class="vs-breakrow"><span>Sklo</span><b>${r.g.price?'+ '+euro(r.g.price):'v cene'}</b></div><div class="vs-breakrow"><span>Doplnky</span><b>${euro(r.opt)}</b></div><div class="vs-breakrow"><span>Montáž / zabudovanie</span><b>+${euro(r.install)}</b></div><div class="vs-breakrow"><span>Orientačne s DPH</span><b>${euro(r.vat)}</b></div></div></div><div class="vs-lead-card"><div class="vs-lead-head"><span class="vs-final-ico">✉</span><span><b>Odoslať dopyt firme</b><small>Vyplňte kontakt. Po napojení príde konfigurácia firme.</small></span></div><div class="vs-lead-form"><input id="vs-name" placeholder="Meno a priezvisko *"><div class="vs-lead-row"><input id="vs-mail" placeholder="E-mail *"><input id="vs-phone" placeholder="Telefón *"></div><textarea id="vs-note" placeholder="Poznámka, rozmery priestoru, lokalita..."></textarea><label class="vs-consent"><input id="vs-consent" type="checkbox"><span>Súhlasím so spracovaním osobných údajov za účelom vybavenia dopytu.</span></label><div id="vs-lead-status" class="vs-lead-status"></div><button id="vs-send-lead" class="vs-send-lead" onclick="VSWidget.sendLead()">Odoslať dopyt</button></div></div>`}
function renderCalc(){let total=7,progress=Math.round(((state.step+1)/total)*100),last=state.step>=total-1;calc.innerHTML=`<div class="vs-calc-head"><h3>Konfigurátor sauny</h3><button class="vs-calc-close" onclick="VSWidget.closeCalc()">×</button></div><div class="vs-progress"><button class="vs-back" onclick="VSWidget.prev()" ${state.step===0?'disabled':''}>‹</button><div class="vs-bar"><div class="vs-bar-fill" style="width:${progress}%"></div></div><div class="vs-count">${state.step+1}/${total}</div></div>${previewHtml()}<div class="vs-step">${stepHtml()}</div><div class="vs-actions"><button class="vs-btn secondary" onclick="VSWidget.prev()" ${state.step===0?'disabled':''}>Späť</button><button class="vs-btn" onclick="VSWidget.next()">${last?'Nová konfigurácia':'Pokračovať'}</button></div>`}
window.VSWidget={toggle(){state.open?this.close():this.open()},open(){state.open=true;chat.classList.add('visible');chat.setAttribute('aria-hidden','false');$('vasasauna-bubble').classList.add('open');this.hideTeaser();if(!messages.dataset.init){addMsg('Dobrý deň. Som <b>AI asistent Vaša Sauna</b>. Pomôžem vám vybrať správny typ sauny a v konfigurátore prejdete výberom <b>typu</b>, <b>prostredia</b>, <b>veľkosti</b>, <b>materiálu</b> a <b>doplnkov</b>.');messages.dataset.init='1'}},close(){state.open=false;chat.classList.remove('visible','calc-open');chat.setAttribute('aria-hidden','true');$('vasasauna-bubble').classList.remove('open')},openCalc(){this.open();chat.classList.add('calc-open');renderCalc()},closeCalc(){chat.classList.remove('calc-open')},hideTeaser(){teaser.classList.remove('show')},submitChat(e){e.preventDefault();let val=input.value.trim();if(!val)return;input.value='';addMsg(esc(val),'user');setTimeout(()=>addMsg(reply(val),'bot'),250)},quick(t){this.open();addMsg(esc(t),'user');setTimeout(()=>addMsg(reply(t),'bot'),250)},select(k,id){state.choice[k]=id;renderCalc()},toggleOption(id){let a=state.choice.options,i=a.indexOf(id);i>=0?a.splice(i,1):a.push(id);renderCalc()},next(){state.step<6?state.step++:state.step=0;renderCalc()},prev(){if(state.step>0)state.step--;renderCalc()},sendLead(){let st=$('vs-lead-status'),n=$('vs-name').value.trim(),m=$('vs-mail').value.trim(),ph=$('vs-phone').value.trim(),ok=$('vs-consent').checked;if(!n||!m||!ph){st.className='vs-lead-status show err';st.textContent='Vyplňte meno, e-mail aj telefón.';return}if(!ok){st.className='vs-lead-status show err';st.textContent='Najprv potvrďte súhlas so spracovaním údajov.';return}st.className='vs-lead-status show err';st.textContent='Odosielanie ešte nie je napojené. Doplňte VS_LEAD_ENDPOINT alebo EmailJS.'}};
setTimeout(()=>{if(!state.open)teaser.classList.add('show')},1300);
})();
